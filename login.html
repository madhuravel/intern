<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Madhuravel P</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="navbar-slot"></div>

<main class="auth-wrap">
  <div class="auth-card">
    <div class="auth-card__bar">
      <span class="dot dot--red"></span><span class="dot dot--yellow"></span><span class="dot dot--green"></span>
      <span class="title">login.php</span>
    </div>
    <div class="auth-card__body">
      <h1>Welcome back</h1>
      <p class="subtitle">// authenticate to continue</p>

      <form id="loginForm" novalidate>
        <div class="mb-3">
          <label for="loginEmail" class="form-label">Email</label>
          <input type="email" class="form-control" id="loginEmail" placeholder="you@example.com" required>
          <div class="invalid-feedback"></div>
        </div>

        <div class="mb-3">
          <label for="loginPassword" class="form-label">Password</label>
          <div class="input-group">
            <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" required>
            <button class="btn btn-toggle" type="button" data-target="loginPassword">Show</button>
          </div>
          <div class="invalid-feedback"></div>
        </div>

        <button type="submit" class="btn btn-terminal mt-2">$ login</button>
      </form>

      <p class="auth-switch">No account? <a href="register.html">register here</a></p>
    </div>
  </div>
</main>

<div id="footer-slot"></div>

<script src="js/components.js"></script>
<script>mountComponents('login.html');</script>
<script src="js/auth.js"></script>
</body>
</html>
